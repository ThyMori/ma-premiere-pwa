<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Première PWA</title>

    <!-- déclare le MANIFEST de l'application PWA -->
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <h1>Bienvenue dans ma PWA !</h1>
    <p>Si vous voyez ceci, le HTML fonctionne.</p>
    <button id="monBouton">Cliquez-moi</button>

    <script>
        // Nous ajouterons du JavaScript ici plus tard
        document.getElementById('monBouton').addEventListener('click', function() {
            alert('Bravo ! Vous avez créé votre première interaction.');
        });
    </script>

    <!-- script du Service Worker    -->
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(registration => {
          console.log('ServiceWorker enregistré avec succès :', registration.scope);
        })
        .catch(error => {
          console.log('Échec de l\'enregistrement du ServiceWorker :', error);
        });
    });
  }
</script>
</body>
</html>

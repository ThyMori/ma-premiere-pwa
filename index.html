<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Stock Sécurisée</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; }
        
        /* Styles de l'application */
        .app-container { display: none; } /* Caché par défaut */
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; box-sizing: border-box; }
        button.btn-add { width: 100%; background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .stock-list { list-style: none; padding: 0; }
        .stock-item { background: white; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stock-item:first-child { border-top-left-radius: 10px; border-top-right-radius: 10px; }
        .stock-item:last-child { border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; border-bottom: none; }
        .item-info { flex-grow: 1; }
        .item-name { font-weight: bold; display: block; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn-ctrl { width: 30px; height: 30px; border-radius: 50%; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; color: white; }
        .btn-minus { background-color: #e74c3c; }
        .btn-plus { background-color: #3498db; }
        
        /* Styles de la page de connexion */
        #login-screen { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn-login { width: 100%; background-color: #2c3e50; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        .btn-logout { background-color: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; float: right; font-size: 0.9rem; }
        .toggle-link { color: #3498db; cursor: pointer; text-decoration: underline; font-size: 0.9rem; margin-top: 15px; display: block; }
        .error-msg { color: red; font-size: 0.9rem; margin-top: 10px; display: none; }
        .loading { text-align: center; color: #3498db; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

    <!-- ÉCRAN DE CONNEXION -->
    <div id="login-screen">
        <h2>🔐 Authentification</h2>
        <div class="input-group">
            <input type="email" id="email" placeholder="Votre email">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Votre mot de passe">
        </div>
        <button class="btn-login" onclick="handleLogin()">Se connecter</button>
        <button class="btn-login" id="btn-signup" onclick="handleSignup()" style="background-color: #7f8c8d;">Créer un compte</button>
        <p id="login-error" class="error-msg"></p>
        <span class="toggle-link" onclick="toggleMode()" id="toggle-text">Pas encore de compte ? S'inscrire</span>
    </div>

    <!-- APPLICATION (Cachée tant qu'on n'est pas connecté) -->
    <div id="app" class="app-container">
        <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
        <h1>📦 Mon Stock Sécurisé</h1>
        <p style="text-align: center; font-size: 0.9rem; color: #666;">Connecté en tant que : <span id="user-email" style="font-weight: bold;"></span></p>

        <div class="card">
            <div class="input-group">
                <label for="nomProduit">Nom du produit</label>
                <input type="text" id="nomProduit" placeholder="Ex: découpe 614SX">
            </div>
            <div class="input-group">
                <label for="qtyProduit">Quantité initiale</label>
                <input type="number" id="qtyProduit" value="0" inputmode="numeric">
            </div>
            <button class="btn-add" onclick="ajouterProduit()">Ajouter au stock</button>
        </div>

        <div id="loading" class="loading">Chargement des données...</div>
        <ul id="listeStock" class="stock-list"></ul>
        <div id="messageVide" class="empty-msg" style="text-align: center; color: #999; display:none;">Aucun produit en stock.</div>
    </div>

    <script>
        // 1. CONFIGURATION
        const SUPABASE_URL = 'https://lhyqnjnqvydxemjjxuoy.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxoeXFuam5xdnlkeGVtamp4dW95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzM5NjcsImV4cCI6MjA5MDQ0OTk2N30.tiRBGOG-rv9grgYc8oGo3-wyAd5RF8d3x_dmjaDZkZk';
        
        const monSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let monStock = [];
        let estEnModeInscription = false;

        // 2. GESTION DE L'AUTHENTIFICATION
        async function verifierSession() {
            const { data: { session } } = await monSupabase.auth.getSession();
            if (session) {
                afficherApplication(session.user.email);
            } else {
                afficherLogin();
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await monSupabase.auth.signInWithPassword({ email, password });
            
            if (error) afficherErreur(error.message);
        }

        async function handleSignup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (estEnModeInscription) {
                // Création de compte
                const { error } = await monSupabase.auth.signUp({ email, password });
                if (error) afficherErreur(error.message);
                else alert("Compte créé ! Vérifiez vos emails pour confirmer (si activé) ou connectez-vous.");
            } else {
                // Si on clique sur "Créer un compte" sans avoir basculé le mode
                toggleMode();
            }
        }

        async function handleLogout() {
            await monSupabase.auth.signOut();
            window.location.reload();
        }

        function afficherLogin() {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app').style.display = 'none';
        }

        function afficherApplication(email) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('user-email').textContent = email;
            chargerStock();
        }

        function afficherErreur(msg) {
            const el = document.getElementById('login-error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function toggleMode() {
            estEnModeInscription = !estEnModeInscription;
            const btn = document.getElementById('btn-signup');
            const txt = document.getElementById('toggle-text');
            if (estEnModeInscription) {
                btn.textContent = "Valider l'inscription";
                btn.style.backgroundColor = "#27ae60";
                txt.textContent = "Déjà un compte ? Se connecter";
            } else {
                btn.textContent = "Créer un compte";
                btn.style.backgroundColor = "#7f8c8d";
                txt.textContent = "Pas encore de compte ? S'inscrire";
            }
        }

        // 3. GESTION DES DONNÉES (Identique à avant, mais protégé par RLS)
        async function chargerStock() {
            const { data, error } = await monSupabase.from('stock').select('*').order('created_at', { ascending: false });
            if (error) {
                console.error('Erreur:', error);
                if (error.message.includes('JWT')) handleLogout(); // Si token invalide, on déconnecte
                return;
            }
            monStock = data || [];
            document.getElementById('loading').style.display = 'none';
            afficherStock();
            activerTempsReel();
        }

        function activerTempsReel() {
            monSupabase.channel('table-stock-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'stock' }, (payload) => {
                    gererMiseAJourTempsReel(payload);
                })
                .subscribe();
        }

        function gererMiseAJourTempsReel(payload) {
            const eventType = payload.eventType;
            const nouveauProduit = payload.new;
            const ancienProduit = payload.old;

            if (eventType === 'INSERT') monStock.unshift(nouveauProduit);
            else if (eventType === 'UPDATE') {
                const index = monStock.findIndex(p => p.id === nouveauProduit.id);
                if (index !== -1) monStock[index] = nouveauProduit;
            }
            else if (eventType === 'DELETE') monStock = monStock.filter(p => p.id !== ancienProduit.id);
            afficherStock();
        }

        function afficherStock() {
            const liste = document.getElementById('listeStock');
            const messageVide = document.getElementById('messageVide');
            liste.innerHTML = '';
            if (monStock.length === 0) {
                messageVide.style.display = 'block';
            } else {
                messageVide.style.display = 'none';
                monStock.forEach((produit) => {
                    const li = document.createElement('li');
                    li.className = 'stock-item';
                    li.innerHTML = `
                        <div class="item-info">
                            <span class="item-name">${produit.nom}</span>
                            <span class="item-qty">ID: ${produit.id}</span>
                        </div>
                        <div class="controls">
                            <button class="btn-ctrl btn-minus" onclick="modifierStock(${produit.id}, -1)">-</button>
                            <span class="qty-display">${produit.quantite}</span>
                            <button class="btn-ctrl btn-plus" onclick="modifierStock(${produit.id}, 1)">+</button>
                        </div>`;
                    liste.appendChild(li);
                });
            }
        }

        async function ajouterProduit() {
            const nomInput = document.getElementById('nomProduit');
            const qtyInput = document.getElementById('qtyProduit');
            const nom = nomInput.value.trim();
            const quantite = parseInt(qtyInput.value) || 0;

            if (nom === "") { alert("Veuillez entrer un nom de produit."); return; }

            const { data, error } = await monSupabase.from('stock').insert([{ nom: nom, quantite: quantite }]).select();
            if (error) {
                console.error('Erreur insertion:', error);
                alert("Erreur : " + error.message); // Affichera "Permission denied" si pas connecté
            } else {
                monStock.unshift(data[0]);
                afficherStock();
                nomInput.value = "";
                qtyInput.value = "0";
                nomInput.focus();
            }
        }

        async function modifierStock(id, variation) {
            const produit = monStock.find(p => p.id === id);
            if (!produit) return;
            const nouvelleQuantite = produit.quantite + variation;
            if (nouvelleQuantite < 0) return;

            produit.quantite = nouvelleQuantite;
            afficherStock();

            const { error } = await monSupabase.from('stock').update({ quantite: nouvelleQuantite }).eq('id', id);
            if (error) {
                console.error('Erreur update:', error);
                chargerStock();
            }
        }

        // Démarrage
        verifierSession();

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => console.log('SW OK'));
            });
        }
    </script>
</body>
</html>

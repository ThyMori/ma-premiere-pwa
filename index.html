<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Stock - Thierry</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    
    <style>
        /* --- STYLE (CSS) --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; }
        
        /* Formulaire d'ajout */
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box; /* Important pour que le padding ne dépasse pas */
        }
        button.btn-add {
            width: 100%;
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button.btn-add:active { background-color: #219150; }

        /* Liste des produits */
        .stock-list { list-style: none; padding: 0; }
        .stock-item {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-item:first-child { border-top-left-radius: 10px; border-top-right-radius: 10px; }
        .stock-item:last-child { border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; border-bottom: none; }
        
        .item-info { flex-grow: 1; }
        .item-name { font-weight: bold; display: block; }
        .item-qty { font-size: 0.85rem; color: #777; }
        
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn-ctrl {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-minus { background-color: #e74c3c; color: white; }
        .btn-plus { background-color: #3498db; color: white; }
        .qty-display { font-weight: bold; min-width: 30px; text-align: center; }

        .empty-msg { text-align: center; color: #999; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

    <h1>📦 Mon Stock</h1>

    <!-- Formulaire d'ajout -->
    <div class="card">
        <div class="input-group">
            <label for="nomProduit">Nom du produit</label>
            <input type="text" id="nomProduit" placeholder="Ex: Vis à bois 4mm">
        </div>
        <div class="input-group">
            <label for="qtyProduit">Quantité initiale</label>
            <input type="number" id="qtyProduit" value="0" inputmode="numeric">
        </div>
        <button class="btn-add" onclick="ajouterProduit()">Ajouter au stock</button>
    </div>

    <!-- Liste des produits -->
    <ul id="listeStock" class="stock-list">
        <!-- Les produits s'afficheront ici automatiquement -->
    </ul>
    <div id="messageVide" class="empty-msg">Aucun produit en stock.</div>

    <script>
        /* --- LOGIQUE (JAVASCRIPT) --- */

        // 1. Chargement des données au démarrage
        let monStock = [];

        function chargerStock() {
            // On récupère les données du localStorage (mémoire du navigateur)
            const donnees = localStorage.getItem('monStockPWA');
            if (donnees) {
                monStock = JSON.parse(donnees);
            }
            afficherStock();
        }

        // 2. Fonction pour afficher la liste à l'écran
        function afficherStock() {
            const liste = document.getElementById('listeStock');
            const messageVide = document.getElementById('messageVide');
            
            liste.innerHTML = ''; // On vide l'affichage actuel

            if (monStock.length === 0) {
                messageVide.style.display = 'block';
            } else {
                messageVide.style.display = 'none';
                
                // On boucle sur chaque produit pour créer son affichage
                monStock.forEach((produit, index) => {
                    const li = document.createElement('li');
                    li.className = 'stock-item';
                    li.innerHTML = `
                        <div class="item-info">
                            <span class="item-name">${produit.nom}</span>
                            <span class="item-qty">Réf: ${index + 1}</span>
                        </div>
                        <div class="controls">
                            <button class="btn-ctrl btn-minus" onclick="modifierStock(${index}, -1)">-</button>
                            <span class="qty-display">${produit.quantite}</span>
                            <button class="btn-ctrl btn-plus" onclick="modifierStock(${index}, 1)">+</button>
                        </div>
                    `;
                    liste.appendChild(li);
                });
            }
        }

        // 3. Fonction pour ajouter un produit
        function ajouterProduit() {
            const nomInput = document.getElementById('nomProduit');
            const qtyInput = document.getElementById('qtyProduit');
            
            const nom = nomInput.value.trim();
            const quantite = parseInt(qtyInput.value) || 0;

            if (nom === "") {
                alert("Veuillez entrer un nom de produit.");
                return;
            }

            // On ajoute au tableau
            monStock.push({ nom: nom, quantite: quantite });
            
            // On sauvegarde et on affiche
            sauvegarderStock();
            afficherStock();
            
            // On vide les champs
            nomInput.value = "";
            qtyInput.value = "0";
            nomInput.focus(); // On remet le curseur dans le champ nom
        }

        // 4. Fonction pour modifier la quantité (+ ou -)
        function modifierStock(index, variation) {
            monStock[index].quantite += variation;
            
            // Optionnel : empêcher les quantités négatives
            if (monStock[index].quantite < 0) {
                monStock[index].quantite = 0;
            }

            sauvegarderStock();
            afficherStock();
        }

        // 5. Fonction de sauvegarde dans le téléphone
        function sauvegarderStock() {
            localStorage.setItem('monStockPWA', JSON.stringify(monStock));
        }

        // Lancer le chargement quand la page est prête
        chargerStock();

        // Enregistrement du Service Worker (déjà présent, on le garde)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW enregistré', reg.scope))
                    .catch(err => console.log('SW échec', err));
            });
        }
    </script>
</body>
</html>
